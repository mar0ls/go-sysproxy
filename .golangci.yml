version: "2"
run:
  timeout: 3m
linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - revive
    - unconvert
    - gocritic
    - gosec
    - nolintlint
  settings:
    gosec:
      excludes:
        - G705
        - G101  # false positive on example URLs in usage strings
    revive:
      severity: warning
    gocritic:
      enabled-checks:
        - boolExprSimplify
  exclusions:
    rules:
      - path: "^generated_.*\\.go$"
        linters:
          - all
formatters:
  enable:
    - gofumpt
    - goimports
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
