linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - gosec
    - noctx
    - bodyclose
    - prealloc
    - unconvert
    - unparam
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-blank: true
  govet:
    enable-all: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
