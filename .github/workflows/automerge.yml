name: Auto-merge dev→main

# The --auto flag defers merge until required status checks pass, but only if
# main has branch protection with those checks marked "required" in
# Settings → Branches. Without required checks configured, GitHub merges
# immediately and CI failures do not block the merge.

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: github.head_ref == 'dev'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --merge "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
